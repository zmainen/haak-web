<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <clipPath id="left">
      <rect x="0" y="0" width="16" height="32"/>
    </clipPath>
    <clipPath id="right">
      <rect x="16" y="0" width="16" height="32"/>
    </clipPath>
  </defs>
  <!-- Left half: solid fill -->
  <circle cx="16" cy="16" r="13" fill="#c4956a" clip-path="url(#left)"/>
  <!-- Right half: outline only -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#c4956a" stroke-width="2.5" clip-path="url(#right)"/>
  <!-- Vertical dividing line -->
  <line x1="16" y1="3" x2="16" y2="29" stroke="#c4956a" stroke-width="2.5"/>
</svg>
